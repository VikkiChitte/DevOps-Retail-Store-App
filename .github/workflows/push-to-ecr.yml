#CI for Catalog Service

name: Catalog Service CI

on:
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------------------------------
  # STAGE 1: SECRET DETECTION
  # Scans entire codebase for leaked credentials/API keys
  # before anything else runs. Fails fast if secrets found.
  # -------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for trufflehog

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          only-verified: true

  # -------------------------------------------------------
  # STAGE 2: SAST (Static Application Security Testing)
  # Scans Go source code for security vulnerabilities
  # like SQL injection, path traversal, hardcoded creds.
  # -------------------------------------------------------
  sast:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gosec SAST Scanner
        uses: securego/gosec@master
        with:
          args: ./Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog/...

  # -------------------------------------------------------
  # STAGE 3: DEPENDENCY SCAN (SCA)
  # Checks go.mod dependencies for known CVEs.
  # Fails pipeline on CRITICAL or HIGH vulnerabilities.
  # -------------------------------------------------------
  dependency-scan:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan dependencies for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog
          severity: CRITICAL,HIGH
          exit-code: 1

  # -------------------------------------------------------
  # STAGE 4: BUILD
  # Compiles the Go binary. Only runs after security
  # stages pass — no point building vulnerable code.
  # -------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Setup Go 1.22
        uses: actions/setup-go@v4
        with:
          go-version: 1.22
      
      - name: Install Dependencies
        run: go mod download
        working-directory: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog

      - name: Build
        run: go build -o catalog .
        working-directory: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog

  # -------------------------------------------------------
  # STAGE 5: CODE QUALITY
  # Runs golangci-lint to enforce coding standards.
  # Runs in parallel with build to save time.
  # -------------------------------------------------------
  code-quality:
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2
          working-directory: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog

  # -------------------------------------------------------
  # STAGE 6: DOCKER BUILD + IMAGE SCAN + SIGN & PUSH
  # Builds the image, scans it for OS/package CVEs,
  # signs it with Cosign to prove it came from this
  # pipeline, then pushes to Docker Hub.
  # -------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    environment: Development
    needs: [build, code-quality]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog
          file: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog/Dockerfile
          push: false  # build only, scan before pushing
          tags: ${{ secrets.DOCKER_USERNAME }}/catalog:${{ github.run_id }}
          load: true

      # Scans the built image for OS and package CVEs.
      # exit-code: 1 means pipeline fails if CRITICAL/HIGH found.
      - name: Scan Docker image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKER_USERNAME }}/catalog:${{ github.run_id }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # Installs Cosign — a tool to cryptographically sign
      # container images so consumers can verify authenticity.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Signs the image using keyless signing (OIDC-based).
      # This proves the image was built by THIS pipeline
      # and hasn't been tampered with.
      - name: Sign Docker image
        run: cosign sign --yes ${{ secrets.DOCKER_USERNAME }}/catalog:${{ github.run_id }}

      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog
          file: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/catalog/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/catalog:${{ github.run_id }}
