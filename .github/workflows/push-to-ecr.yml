#CI for Catalog Service

name: Catalog Service CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Setup Go 1.22
        uses: actions/setup-go@v4
        with:
          go-version: 1.22
      
      - name: Install Dependencies
        run: go mod download
        working-directory: retail-store-sample-app-1.3.0/src/catalog

      - name: Build
        run: go build -o catalog .
        working-directory: retail-store-sample-app-1.3.0/src/catalog

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56.2
          working-directory: retail-store-sample-app-1.3.0/src/catalog

  docker:
    runs-on: ubuntu-latest
    environment: Development

    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker
        uses: docker/setup-buildx-action@v3
   
      - name: Log in to Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: retail-store-sample-app-1.3.0/src/catalog
          file: retail-store-sample-app-1.3.0/src/catalog/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/catalog:${{ github.run_id }}

        

