# CI for Orders Service

name: Orders Service CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/orders/**'
  push:
    branches:
      - main
    paths:
      - 'Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/orders/**'
  workflow_dispatch:

env:
  WORKING_DIR: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/orders
  IMAGE_NAME: orders

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build and Test
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          chmod +x mvnw
          ./mvnw verify -B -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-orders
          path: ${{ env.WORKING_DIR }}/target/surefire-reports/

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.run_id }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:cache,mode=max
