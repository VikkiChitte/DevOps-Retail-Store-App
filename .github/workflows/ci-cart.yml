name: CI - Build, Test and Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/cart/**'
  pull_request:
    branches:
      - main
    paths:
      - 'Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/cart/**'

env:
  IMAGE_NAME: cart-service

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build and Test
        working-directory: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/cart
        run: |
          chmod +x mvnw
          ./mvnw verify -B -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/cart/target/surefire-reports/

  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/cart
          file: Code-Backup-1.3.0/retail-store-sample-app-1.3.0/src/cart/Dockerfile
          push: true
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:cache,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
